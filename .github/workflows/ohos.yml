name: OpenHarmony

on:
  push:
    branches: ["develop", "main", "releases/**"]
  pull_request:
    branches: ["develop", "main"]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    # necessary for windows
    shell: bash

jobs:
  setup-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenHarmony SDK (5.1.0 Native only)
        uses: openharmony-rs/setup-ohos-sdk@v0.2
        with:
          version: "5.1.0"
          components: "native"

      - name: Prepare SDK Directory
        run: |
          sudo mkdir -p /usr/local/ohos-sdk/linux/native
          echo "Target directory created: /usr/local/ohos-sdk/linux/native"

      - name: Download and Extract Custom SDK
        run: |
          wget https://github.com/FrankHan052176/Easytier-OHOS-sdk/releases/download/v1/ohos-sdk.zip -O /tmp/ohos-sdk.zip
          sudo unzip -o /tmp/ohos-sdk.zip -d /tmp/custom-sdk
          sudo cp -rf /tmp/custom-sdk/linux/native/* /usr/local/ohos-sdk/linux/native/
          echo "Custom SDK files deployed to /usr/local/ohos-sdk/linux/native"
        
      - name: Move Native SDK to /usr/local/ohos-sdk/linux/native
        run: |
          echo "Detected Native SDK path: $OHOS_SDK_NATIVE"
          sudo cp -r "$OHOS_SDK_NATIVE" /usr/local/ohos-sdk/linux/native
          echo "Native SDK moved to /usr/local/ohos-sdk/linux/native"

      - name: Verify SDK
        run: |
          ls -la /usr/local/ohos-sdk/linux/native/sysroot/usr

      - name: Debug Paths
        working-directory: ${{ github.workspace }}
        run: |
          echo "Current directory: $(pwd)"
          ls -la .
      # 配置交叉编译环境
      - name: Setup build environment
        env:
          OHOS_SDK_PATH: /usr/local/ohos-sdk/linux
          TARGET_ARCH: aarch64-linux-ohos
        run: |
          echo "OHOS_SDK_PATH=/usr/local/ohos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_BASE_SDK_HOME=/usr/local/ohos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_NDK_HOME=/usr/local/ohos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_SDK_NATIVE=/usr/local/ohos-sdk/linux/native"
          echo "TARGET_ARCH="aarch64-linux-ohos" >> $GITHUB_ENV
          echo "OHOS_TOOLCHAIN_DIR=${OHOS_SDK_PATH}/native/llvm" >> $GITHUB_ENV
          echo "OHOS_SYSROOT=${OHOS_SDK_PATH}/native/sysroot" >> $GITHUB_ENV
          echo "CC=${OHOS_TOOLCHAIN_DIR}/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV
          echo "CXX=${OHOS_TOOLCHAIN_DIR}/bin/aarch64-unknown-linux-ohos-clang++" >> $GITHUB_ENV
          echo "AR=${OHOS_TOOLCHAIN_DIR}/bin/llvm-ar" >> $GITHUB_ENV
          echo "LD=${OHOS_TOOLCHAIN_DIR}/bin/ld.lld" >> $GITHUB_ENV
          echo "CFLAGS=-fPIC -D__MUSL__=1 -march=armv8-a --target=${TARGET_ARCH} -Wno-error --sysroot=${OHOS_SYSROOT} -I${OHOS_SYSROOT}/usr/include/${TARGET_ARCH}" >> $GITHUB_ENV
          echo "LDFLAGS=--sysroot=${OHOS_SYSROOT} -L${OHOS_SYSROOT}/usr/lib/${TARGET_ARCH} -fuse-ld=${LD}" >> $GITHUB_ENV
          echo "PATH=${OHOS_TOOLCHAIN_DIR}/bin:${PATH}" >> $GITHUB_ENV

      - name: Build
        working-directory: ${{ github.workspace }}/easytier-contrib/easytier-ohrs
        run: |
          sudo apt-get install -y protobuf-compiler
          bash ${{ github.workspace }}/.github/workflows/install_rust.sh
          cargo install ohrs
          rustup target add aarch64-unknown-linux-ohos
          ohrs doctor
          env | sort | grep -E 'OHOS|CC|CXX|AR|LD|CFLAGS|LDFLAGS|TARGET_ARCH|PATH'
          ohrs build --release --arch aarch
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-ohos
          path: ./easytier-contrib/easytier-ohrs/dist/arm64-v8a/libeasytier_ohrs.so
          retention-days: 5
          if-no-files-found: error
