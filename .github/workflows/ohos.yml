name: OpenHarmony

on:
  push:
    branches: ["develop", "main", "releases/**"]
  pull_request:
    branches: ["develop", "main"]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    # necessary for windows
    shell: bash

jobs:
  setup-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenHarmony SDK (5.1.0 Native only)
        uses: openharmony-rs/setup-ohos-sdk@v0.2
        with:
          version: "5.1.0"
          components: "all"

      - name: Prepare SDK Directory
        run: |
          mkdir -p $HOME/ohos-sdk/linux/native
          echo "Target directory created: $HOME/ohos-sdk"

      - name: Download and Extract Custom SDK
        run: |
          wget https://github.com/FrankHan052176/Easytier-OHOS-sdk/releases/download/v1/ohos-sdk.zip -O /tmp/ohos-sdk.zip
          sudo unzip -o /tmp/ohos-sdk.zip -d /tmp/custom-sdk
          sudo cp -rf /tmp/custom-sdk/linux/native/* $HOME/ohos-sdk/linux/native/
          echo "Custom SDK files deployed to $HOME/ohos-sdk/linux/native"
        
      - name: Move Native SDK to $HOME/ohos-sdk/linux/native
        run: |
          echo "Detected Native SDK path: $OHOS_SDK_NATIVE"
          sudo mv -f /home/runner/ohos-sdk/linux/native $HOME/ohos-sdk/linux
          echo "Native SDK moved to $HOME/ohos-sdk/linux/native"

      - name: Verify SDK
        run: |
          ls -la $HOME/ohos-sdk/linux/native/sysroot/usr

      - name: Setup build environment
        env:
          OHOS_SDK_PATH: $HOME/ohos-sdk/linux
          TARGET_ARCH: aarch64-linux-ohos
        run: |
          echo "OHOS_SDK_PATH=$HOME/ohos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_BASE_SDK_HOME=$HOME/ohos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_NDK_HOME=$HOME/ohos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_SDK_NATIVE=$HOME/ohos-sdk/linux/native" >> $GITHUB_ENV
          echo "TARGET_ARCH=aarch64-linux-ohos" >> $GITHUB_ENV
          echo "OHOS_TOOLCHAIN_DIR=$HOME/ohos-sdk/linux/native/llvm" >> $GITHUB_ENV
          echo "OHOS_SYSROOT=$HOME/ohos-sdk/linux/native/sysroot" >> $GITHUB_ENV
          echo "CC_aarch64-unknown-linux-ohos=$HOME/ohos-sdk/linux/native/llvm/bin/clang" >> $GITHUB_ENV
          echo "CC=$HOME/ohos-sdk/linux/native/llvm/bin/aarch64-unknown-linux-ohos-clang" >> $GITHUB_ENV
          echo "CXX_aarch64-unknown-linux-ohos=$HOME/ohos-sdk/linux/native/llvm/bin/clang++" >> $GITHUB_ENV
          echo "CXX=$HOME/ohos-sdk/linux/native/llvm/bin/aarch64-unknown-linux-ohos-clang++" >> $GITHUB_ENV
          echo "AR=$HOME/ohos-sdk/linux/native/llvm/bin/llvm-ar" >> $GITHUB_ENV
          echo "LD=$HOME/ohos-sdk/linux/native/llvm/bin/ld.lld" >> $GITHUB_ENV
          echo "CFLAGS=-fPIC -D__MUSL__=1 -march=armv8-a --target=aarch64-linux-ohos -Wno-error --sysroot=$HOME/ohos-sdk/linux/native/sysroot -I$HOME/ohos-sdk/linux/native/sysroot/usr/include/aarch64-linux-ohos" >> $GITHUB_ENV
          echo "LDFLAGS=--sysroot=$HOME/ohos-sdk/linux/native/sysroot -L$HOME/ohos-sdk/linux/native/sysroot/usr/lib/aarch64-linux-ohos -fuse-ld=$HOME/ohos-sdk/linux/native/llvm/bin/ld.lld" >> $GITHUB_ENV
          echo "PATH=$HOME/ohos-sdk/linux/native/llvm/bin:/home/runner/work/_actions/openharmony-rs/setup-ohos-sdk/v0.2:/bin:/home/runner/work/_actions/openharmony-rs/setup-ohos-sdk/v0.2:/snap/bin:/home/runner/.local/bin:/opt/pipx_bin:/home/runner/.cargo/bin:/home/runner/.config/composer/vendor/bin:$HOME/.ghcup/bin:/home/runner/.dotnet/tools:$HOME/sbin:$HOME/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:$HOME/games:/snap/bin" >> $GITHUB_ENV

      - name: Create clang wrapper script
        run: |
          sudo mkdir -p $HOME/ohos-sdk/linux/native/llvm
          sudo tee $HOME/ohos-sdk/linux/native/llvm/aarch64-unknown-linux-ohos-clang.sh > /dev/null <<'EOF'
          #!/bin/sh
          exec $HOME/ohos-sdk/linux/native/llvm/bin/clang \
            -target aarch64-linux-ohos \
            --sysroot=$HOME/ohos-sdk/linux/native/sysroot \
            -D__MUSL__ \
            "$@"
          EOF
          sudo chmod +x $HOME/ohos-sdk/linux/native/llvm/aarch64-unknown-linux-ohos-clang.sh

      - name: Verify OpenHarmony toolchain
        run: |
          echo "Checking toolchain at $HOME/ohos-sdk/linux/native/llvm/bin/"
          ls -la $HOME/ohos-sdk/linux/native
          ls -la $HOME/ohos-sdk/linux/native/llvm
          ls -la $HOME/ohos-sdk/linux/native/llvm/bin
          # 确认关键文件存在
          [ -f "$HOME/ohos-sdk/linux/native/llvm/bin/clang" ] || {
            echo "❌ Clang not found!";
            exit 1;
          }
          [ -f "$HOME/ohos-sdk/linux/native/llvm/bin/aarch64-unknown-linux-ohos-clang" ] || {
            echo "⚠️  Cross-compiler not found, creating wrapper...";
            exit 1;
          }

      - name: Build
        working-directory: ${{ github.workspace }}/easytier-contrib/easytier-ohrs
        run: |
          sudo apt-get install -y llvm clang lldb lld
          sudo apt-get install -y protobuf-compiler
          bash ${{ github.workspace }}/.github/workflows/install_rust.sh
          cargo install ohrs
          rustup target add aarch64-unknown-linux-ohos
          ohrs doctor
          env | sort | grep -E 'OHOS|CC|CXX|AR|LD|CFLAGS|LDFLAGS|TARGET_ARCH|PATH'
          ohrs build --release --arch aarch
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-ohos
          path: ./easytier-contrib/easytier-ohrs/dist/arm64-v8a/libeasytier_ohrs.so
          retention-days: 5
          if-no-files-found: error
