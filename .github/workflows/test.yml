name: EasyTier Test

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_TEST_FLAGS: "--no-default-features --features=full --verbose"

defaults:
  run:
    # necessary for windows
    shell: bash

jobs:
  pre_job:
    # continue-on-error: true # Uncomment once integration is finished
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'
          paths: '["Cargo.toml", "Cargo.lock", "easytier/**", ".github/workflows/test.yml", ".github/workflows/install_gui_dep.sh", ".github/workflows/install_rust.sh"]'

      - name: Check Cargo cache Status
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          lookup-only: true

  cache:
    name: Rebuild Cargo Cache
    needs: pre_job
    runs-on: ubuntu-22.04
    if: needs.pre_job.outputs.should_skip != 'true' && needs.pre_job.outputs.cache-hit != 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Setup Frontend Environment
        if: ${{ matrix.web == true || matrix.lint == true }}
        uses: ./.github/actions/prepare-pnpm
        with:
          build_filter: './easytier-web/*'

      - name: Install GUI dependencies (Used by clippy)
        if: ${{ matrix.gui == true || matrix.lint == true }}
        run: |
          bash ./.github/workflows/install_gui_dep.sh
          bash ./.github/workflows/install_rust.sh

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          # GitHub repo token to use to avoid rate limiter
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Pre-build dependencies
        run: |
          mkdir -p easytier-gui/dist
          cargo test --no-run ${{ env.CARGO_TEST_FLAGS }}

  test:
    name: Test (${{ matrix.name }})
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "EasyTier three_node"
            opts: "--package easytier --lib tests::three_node -- --skip tests::three_node::subnet_proxy_three_node_test"
            lint: false
            web: false
            gui: false

          - name: "EasyTier three_node::subnet_proxy_three_node_test"
            opts: "--package easytier --lib tests::three_node::subnet_proxy_three_node_test"
            lint: false
            web: false
            gui: false

          - name: "Lint & Other tests"
            opts: "--workspace -- --skip tests::three_node"
            lint: true
            web: true
            gui: true
    steps:
      - uses: actions/checkout@v3

      - name: Setup Frontend Environment
        if: ${{ matrix.web == true || matrix.lint == true }}
        uses: ./.github/actions/prepare-pnpm
        with:
          build_filter: './easytier-web/*'

      - name: Install GUI dependencies (Used by clippy)
        if: ${{ matrix.gui == true || matrix.lint == true }}
        run: |
          bash ./.github/workflows/install_gui_dep.sh
          bash ./.github/workflows/install_rust.sh
          rustup component add rustfmt
          rustup component add clippy

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          # GitHub repo token to use to avoid rate limiter
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup tools for test
        run: sudo apt install bridge-utils

      - name: Setup system for test
        run: |
          sudo modprobe br_netfilter
          sudo sysctl net.bridge.bridge-nf-call-iptables=0
          sudo sysctl net.bridge.bridge-nf-call-ip6tables=0
          sudo sysctl net.ipv6.conf.lo.disable_ipv6=0
          sudo ip addr add 2001:db8::2/64 dev lo

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        if: ${{ !cancelled() && matrix.lint == true }}
        run: cargo fmt --all -- --check

      - name: Check Clippy
        if: ${{ !cancelled() && matrix.lint == true }}
        # NOTE: tauri need `dist` dir in build.rs
        run: |
          mkdir -p easytier-gui/dist
          cargo clippy --all-targets --all-features --all -- -D warnings

      - name: Run tests
        run: |
          sudo prlimit --pid $$ --nofile=1048576:1048576
          
          echo "Running tests for: ${{ matrix.name }}"
          OPTS="${{ matrix.opts }}"
          COMMON_FLAGS="${{ env.CARGO_TEST_FLAGS }}"
          EXTRA_FLAGS="--test-threads=1"
          
          echo "Step 1: Building as non-root..."
          cargo test $OPTS $COMMON_FLAGS --no-run
          
          echo "Step 2: Running tests as root..."
          if [[ "$OPTS" == *" -- "* ]]; then
              CMD="cargo test ${OPTS/ -- / $COMMON_FLAGS -- } $EXTRA_FLAGS"
          else
              CMD="cargo test $OPTS $COMMON_FLAGS -- $EXTRA_FLAGS"
          fi
          
          echo "Executing: sudo -E env PATH=$PATH $CMD"
          sudo -E env "PATH=$PATH" $CMD
          
          sudo chown -R $USER:$USER ./target
          sudo chown -R $USER:$USER ~/.cargo
