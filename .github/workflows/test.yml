name: EasyTier Test

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_TEST_FLAGS: "--no-default-features --features=full"
#  RUSTC_WRAPPER: "sccache"
#  SCCACHE_GHA_ENABLED: "true"

defaults:
  run:
    # necessary for windows
    shell: bash

jobs:
  pre_job:
    # continue-on-error: true # Uncomment once integration is finished
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'
          paths: '["Cargo.toml", "Cargo.lock", "easytier/**", ".github/workflows/test.yml", ".github/workflows/install_gui_dep.sh", ".github/workflows/install_rust.sh"]'

  lint:
    name: Run linters
    runs-on: ubuntu-latest
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          gui: true
          web: true

      - name: Install rustfmt and clippy
        run: |
          rustup component add rustfmt
          rustup component add clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Clippy
        run: cargo clippy --all-targets --all-features --all -- -D warnings

  build-test:
    name: Build test
    runs-on: ubuntu-latest
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          gui: true
          web: true

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Build test
        run: |
          cargo test --no-run --workspace ${{ env.CARGO_TEST_FLAGS }}
          cargo nextest archive --workspace --archive-file tests.tar.zst ${{ env.CARGO_TEST_FLAGS }}

      - uses: actions/upload-artifact@v4
        with:
          name: tests
          path: tests.tar.zst
          retention-days: 1

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [ pre_job, build-test ]
    if: needs.pre_job.outputs.should_skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "tests::three_node"
            opts: "-E 'test(tests::three_node) and not test(subnet_proxy_three_node_test)' --test-threads 1"

          - name: "tests::three_node::subnet_proxy_three_node_test"
            opts: "-E 'test(subnet_proxy_three_node_test)' --test-threads 1"

          - name: "Other tests"
            opts: "-E 'not test(tests::three_node)' --test-threads 1"
    steps:
      - uses: actions/checkout@v3

      - name: Setup tools for test
        run: sudo apt install bridge-utils

      - name: Setup system for test
        run: |
          sudo modprobe br_netfilter
          sudo sysctl net.bridge.bridge-nf-call-iptables=0
          sudo sysctl net.bridge.bridge-nf-call-ip6tables=0
          sudo sysctl net.ipv6.conf.lo.disable_ipv6=0
          sudo ip addr add 2001:db8::2/64 dev lo

      - uses: taiki-e/install-action@nextest

      - name: Download tests
        uses: actions/download-artifact@v4
        with:
          name: tests

      - name: Run tests
        run: cargo nextest run --archive-file tests.tar.zst ${{ matrix.opts }}
