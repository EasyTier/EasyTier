name: EasyTier Test

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_TEST_FLAGS: "--no-default-features --features=full --workspace"
#  RUSTC_WRAPPER: "sccache"
#  SCCACHE_GHA_ENABLED: "true"

defaults:
  run:
    # necessary for windows
    shell: bash

jobs:
  pre_job:
    # continue-on-error: true # Uncomment once integration is finished
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      lint-cache-hit: ${{ steps.lint-cache.outputs.cache-hit }}
      test-cache-hit: ${{ steps.test-cache.outputs.cache-hit }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'
          paths: '["Cargo.toml", "Cargo.lock", "easytier/**", ".github/workflows/test.yml", ".github/workflows/install_gui_dep.sh", ".github/workflows/install_rust.sh"]'

      - name: Check Cargo lint cache status
        id: lint-cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          lookup-only: true

      - name: Check Cargo test cache Status
        id: test-cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          lookup-only: true

  lint:
    name: Run linters
    runs-on: ubuntu-latest
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          gui: true
          web: true

      - name: Install rustfmt and clippy
        run: |
          rustup component add rustfmt
          rustup component add clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check Clippy
        run: |
          cargo clippy --all-targets --all-features --all -- -D warnings

  test-cache:
    name: Rebuild Cargo test cache
    runs-on: ubuntu-latest
    needs: pre_job
    if: |
      needs.pre_job.outputs.should_skip != 'true' && needs.pre_job.outputs.test-cache-hit != 'true'
    steps:
      - uses: actions/checkout@v3

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          gui: true
          web: true

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Pre-build dependencies
        run: |
          cargo test --no-run ${{ env.CARGO_TEST_FLAGS }}

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [ pre_job, test-cache ]
    if: |
      !failure() && !cancelled() &&
      needs.pre_job.outputs.should_skip != 'true' &&
      (needs.cache.result == 'success' || needs.cache.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "tests::three_node"
            opts: " --lib tests::three_node -- --skip tests::three_node::subnet_proxy_three_node_test"
            web: false
            gui: false

          - name: "tests::three_node::subnet_proxy_three_node_test"
            opts: " --lib tests::three_node::subnet_proxy_three_node_test"
            web: false
            gui: false

          - name: "Other tests"
            opts: " -- --skip tests::three_node"
            web: true
            gui: true
    steps:
      - uses: actions/checkout@v3

      - name: Prepare build environment
        uses: ./.github/actions/prepare-build
        with:
          gui: ${{ matrix.gui }}
          web: ${{ matrix.web }}

      - name: Setup tools for test
        run: sudo apt install bridge-utils

      - name: Setup system for test
        run: |
          sudo modprobe br_netfilter
          sudo sysctl net.bridge.bridge-nf-call-iptables=0
          sudo sysctl net.bridge.bridge-nf-call-ip6tables=0
          sudo sysctl net.ipv6.conf.lo.disable_ipv6=0
          sudo ip addr add 2001:db8::2/64 dev lo

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tests
        run: |
          sudo prlimit --pid $$ --nofile=1048576:1048576
          
          echo "Building tests for: ${{ matrix.name }}"
          OPTS="${{ matrix.opts }}"
          
          echo "Building as non-root..."
          cargo test --no-run ${{ env.CARGO_TEST_FLAGS }} $OPTS

      - name: Run tests
        run: |          
          echo "Running tests for: ${{ matrix.name }}"
          OPTS="${{ matrix.opts }}"
          [[ "$OPTS" != *" -- "* ]] && OPTS="$OPTS --"
          
          CMD="cargo test ${{ env.CARGO_TEST_FLAGS }} $OPTS --test-threads=1"
          
          echo "Executing: sudo -E env PATH=$PATH $CMD"
          sudo -E env "PATH=$PATH" $CMD
          
          sudo chown -R $USER:$USER ./target
          sudo chown -R $USER:$USER ~/.cargo
