name: EasyTier Health

on:
  workflow_dispatch:
#  push:
#    branches: [ main, master ]
#    paths:
#      - 'health-check-cli/**'
#  pull_request:
#    branches: [ main, master ]
#    paths:
#      - 'health-check-cli/**'


env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: health-check
            artifact_name: health-check-linux-x86_64
          #          - os: ubuntu-latest
          #            target: x86_64-unknown-linux-musl
          #            binary_name: health-check
          #            artifact_name: health-check-linux-x86_64-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: health-check.exe
            artifact_name: health-check-windows-x86_64.exe
    #          - os: macos-latest
    #            target: x86_64-apple-darwin
    #            binary_name: health-check
    #            artifact_name: health-check-macos-x86_64
    #          - os: macos-latest
    #            target: aarch64-apple-darwin
    #            binary_name: health-check
    #            artifact_name: health-check-macos-aarch64

    defaults:
      run:
        working-directory: ./health-check-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install protobuf compiler
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" == "Windows" ]; then
            choco install protoc
          fi
        shell: bash

      - name: Check project structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Project structure:"
          ls -la
          echo "Cargo.toml exists: $(test -f Cargo.toml && echo 'YES' || echo 'NO')"
          echo "Cargo.lock exists: $(test -f Cargo.lock && echo 'YES' || echo 'NO')"

      - name: Check network connectivity
        run: |
          echo "Testing network connectivity to GitHub..."
          if curl -s --head https://github.com/EasyTier/EasyTier.git | head -n 1 | grep "200\|302"; then
            echo "GitHub connectivity OK"
          else
            echo "GitHub connectivity issue detected"
          fi

      - name: Check Cargo dependencies
        run: |
          echo "Checking Cargo.toml dependencies..."
          cat Cargo.toml
          echo ""
          echo "Attempting to fetch dependencies..."
          cargo fetch --verbose || echo "Fetch failed, continuing..."

      - name: Build release binary
        run: |
          echo "Starting build process..."
          set -x
          cargo build --release --target ${{ matrix.target }} --verbose
          if [ $? -ne 0 ]; then
            echo "Build failed, attempting with offline mode..."
            cargo build --release --target ${{ matrix.target }} --offline --verbose || exit 1
          fi

      - name: Check if binary exists
        run: |
          echo "Checking for binary..."
          echo "Current directory: $(pwd)"
          echo "Target directory structure:"
          ls -la target/ || echo "No target directory"
          if [ -d "target/${{ matrix.target }}" ]; then
            ls -la target/${{ matrix.target }}/
            if [ -d "target/${{ matrix.target }}/release" ]; then
              ls -la target/${{ matrix.target }}/release/
            fi
          fi
          if [ -f "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" ]; then
            echo "Binary found successfully"
          else
            echo "Binary not found"
            echo "Searching for any build artifacts:"
            find . -name "*health*" -o -name "*check*" 2>/dev/null || echo "No artifacts found"
            exit 1
          fi

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ -f "target/${{ matrix.target }}/release/${{ matrix.binary_name}}" ]; then
            strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          else
            echo "Binary not found, skipping strip step"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          retention-days: 30

