[package]
name = "easytier-ffi"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
easytier = { path = "../../easytier" }

once_cell = "1.18.0"
dashmap = "6.0"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
lazy_static = "1.5.0"
tracing = "0.1"
tracing-subscriber = "0.3"

[target.'cfg(target_env= "ohos")'.dependencies]
napi-ohos = "1.0.4"
napi-derive-ohos = "1.0.4"
ohos-hilog-binding = "0.1.1"

[target.'cfg(target_env= "ohos")'.build-dependencies]
napi-build-ohos = "1.0.4"

[profile.dev]
panic = "unwind"
debug = true

[profile.release]
panic = "unwind"
debug = true
